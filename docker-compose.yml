services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tellingtree
      POSTGRES_PASSWORD: tellingtree_dev_password
      POSTGRES_DB: tellingtree_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tellingtree"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://tellingtree:tellingtree_dev_password@postgres:5432/tellingtree_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
